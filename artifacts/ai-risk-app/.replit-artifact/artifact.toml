kind = "web"
previewPath = "/"
title = "Agentic AI リスク評価ツール"
version = "1.0.0"
id = "artifacts/ai-risk-app"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 8000
name = "web"
paths = ["/"]

[services.development]
run = "python /home/runner/workspace/artifacts/ai-risk-app/app.py"

[services.env]
PORT = "8000"
BASE_PATH = "/"
PYTHONPATH = "/home/runner/workspace/artifacts/ai-risk-app"

[services.production]

[services.production.build]
args = ["pip", "install", "-r", "artifacts/ai-risk-app/requirements.txt"]

[services.production.run]
args = ["python", "/home/runner/workspace/artifacts/ai-risk-app/app.py"]

[services.production.run.env]
PORT = "8000"
BASE_PATH = "/"
PYTHONPATH = "/home/runner/workspace/artifacts/ai-risk-app"

[services.production.health.startup]
path = "/"
